<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Jawbreaker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 1.15rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .contact {
      font-size: 0.95rem;
      color: #777;
      line-height: 1.8;
    }

    .contact a {
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }

    .contact a:hover {
      color: #000;
      border-color: #000;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Infinite Jawbreaker</h1>
    <p class="tagline">
      A software development studio building thoughtfully crafted mobile applications.
    </p>
    <div class="contact">
      <p><a href="mailto:contact@infinitejawbreaker.com">contact@infinitejawbreaker.com</a></p>
    </div>
    <footer>&copy; 2026 Infinite Jawbreaker LLC</footer>
  </div>
</body>
</html>
